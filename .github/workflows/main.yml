name: Deploy Laravel to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /home/Rashmika
            # clone repo if not exists
            if [ ! -d "laravel-app" ]; then
              git clone  https://github.com/rnsrashmika078/social-media-unimate-backend.git laravel-app
            fi
            cd laravel-app
            # pull latest changes (IMPORTANT: match branch)
            git pull origin main
            # stop old container
            docker stop laravel_app || true
            docker rm laravel_app || true
            # build image
            docker build -t laravel-app .
            # run container
            docker run -d -p 8000:8000 --name laravel_app laravel-app
